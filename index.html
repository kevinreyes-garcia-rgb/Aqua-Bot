<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Aqua Bot — Juego de Cartas (Animado, Comandos corregidos)</title>

<style>
 :root{
 --green:#075e54;
 --accent:#2fbf9a;
 --whatsapp-user:#dcf8c6;
 --bot-bg:rgba(255,255,255,0.78);
 --text:#111;
 }
 html,body{height:100%;margin:0;font-family:Inter,system-ui,Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#e9f2f6, #f6f6f8);}
 .wrap{min-height:100%;display:flex;align-items:center;justify-content:center;padding:18px;}
 .chat-container{
 width:100%;max-width:920px;height:92vh;
 background:linear-gradient(180deg, rgba(255,255,255,0.6), rgba(250,250,250,0.9));
 backdrop-filter: blur(8px) saturate(120%);
 box-shadow:0 16px 40px rgba(18,30,60,0.12);
 display:flex;flex-direction:column;overflow:hidden;border-radius:16px;
 transform-origin:center center;
 border:1px solid rgba(255,255,255,0.6);
 }
 .header{
 height:76px;background:linear-gradient(90deg,var(--green), #0b8f6b);
 color:#fff;display:flex;align-items:center;gap:12px;padding:10px 14px;
 position:relative;overflow:visible;
 }
 .avatar-wrap{width:56px;height:56px;border-radius:12px;overflow:hidden;flex:0 0 56px;box-shadow:0 6px 18px rgba(0,0,0,0.18)}
 .avatar-wrap img{width:100%;height:100%;object-fit:cover;display:block;transform:translateY(0);transition:transform .7s cubic-bezier(.2,.9,.3,1)}
 .title{font-weight:800;font-size:18px;letter-spacing:0.3px}
 .sub{font-size:12px;opacity:0.95}
 .header .sparkle{position:absolute;right:14px;top:8px;font-size:12px;opacity:.9}
 #messages{
 flex:1;overflow-y:auto;padding:16px 14px 20px;background-image:
 radial-gradient(circle at 10% 20%, rgba(255,255,255,0.04), transparent 6%),
 radial-gradient(circle at 90% 80%, rgba(255,255,255,0.03), transparent 8%);
 display:flex;flex-direction:column;gap:10px;
 position:relative;
 }
 #messages::after{
 content:"";position:absolute;inset:0;
 background-image:url('https://spacny.wuaze.com//uploads/images__18_.jpeg');
 opacity:0.06;mix-blend-mode:overlay;filter:blur(2px) saturate(85%);
 pointer-events:none;
 }
 .bubble{
 display:inline-block;max-width:86%;padding:12px 14px;border-radius:14px;
 margin:0;box-shadow:0 8px 22px rgba(12,18,30,0.06);font-size:14px;color:var(--text);
 word-break:break-word;position:relative;transform-origin:left center;
 backdrop-filter: blur(6px) saturate(120%);
 border: 1px solid rgba(255,255,255,0.4);
 }
 .bot{
 background:var(--bot-bg);align-self:flex-start;border-radius:12px 16px 16px 16px;
 animation:bot-in .45s cubic-bezier(.2,.9,.3,1);
 }
 .user{
 background:var(--whatsapp-user);align-self:flex-end;border-radius:16px 12px 16px 16px;
 animation:user-in .38s cubic-bezier(.2,.9,.3,1);
 }
 @keyframes bot-in{
 from{opacity:0; transform: translateY(8px) scale(.98); filter:blur(6px)}
 to{opacity:1; transform:none; filter:blur(0)}
 }
 @keyframes user-in{
 from{opacity:0; transform: translateY(2px) scale(.96) rotate(-0.4deg)}
 to{opacity:1; transform:none}
 }
 .msg-img{width:100%;border-radius:12px;margin:10px 0;display:block;max-height:420px;object-fit:cover;box-shadow:0 8px 26px rgba(12,18,30,0.12);transform-origin:center center;animation:media-in .45s ease}
 @keyframes media-in{from{opacity:0; transform:scale(.96) translateY(6px)} to{opacity:1; transform:none}}
 .input-area{
 display:flex;padding:12px;background:linear-gradient(180deg, rgba(255,255,255,0.92), #ffffff);align-items:center;gap:8px;
 border-top:1px solid rgba(20,30,40,0.04);
 }
 .input-area input{
 flex:1;padding:12px 14px;border-radius:999px;background:linear-gradient(180deg,#fff,#fbfbfb);
 border:1px solid rgba(20,30,40,0.06);font-size:15px;outline:none;box-shadow:inset 0 1px 0 rgba(255,255,255,0.6);
 transition:box-shadow .18s, transform .12s;
 }
 .input-area input:focus{box-shadow:0 8px 30px rgba(11,143,107,0.06);transform:translateY(-1px)}
 .input-area button{
 background:linear-gradient(180deg,var(--accent),var(--green));color:#fff;padding:10px 14px;
 border-radius:999px;border:none;font-weight:700;cursor:pointer;box-shadow:0 10px 26px rgba(12,18,30,0.12);
 transition:transform .12s, box-shadow .12s;
 }
 .input-area button:active{transform:translateY(1px) scale(.995);box-shadow:0 6px 18px rgba(12,18,30,0.08)}
 /* Menu styles (Aqua) */
 .aqua-menu{
 width:100%;
 animation:fadeIn .7s ease forwards;
 padding:10px;
 box-sizing:border-box;
 }
 .menu-header{
 text-align:center;
 margin-bottom:15px;
 animation:float 3s ease-in-out infinite;
 position:relative;
 }
 .menu-img{
 width:100%;
 max-height:320px;
 object-fit:cover;
 border-radius:14px;
 box-shadow:0 10px 30px rgba(0,170,255,.65),
 0 0 40px rgba(0,150,255,.25);
 animation:pop .6s cubic-bezier(.2,.9,.3,1);
 border: 2px solid rgba(255,255,255,0.6);
 }
 .menu-title{
 margin:12px 0 0;
 font-size:26px;
 color:#0b72ff;
 font-weight:900;
 text-shadow:0 0 10px rgba(0,140,255,.6),0 0 16px rgba(0,140,255,.35);
 }
 .menu-sub{
 font-size:14px;
 color:#444;
 font-style:italic;
 }
 .menu-grid{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:12px;
 }
 .menu-card{
 background:linear-gradient(180deg, rgba(255,255,255,.95), rgba(245,250,255,.9));
 border-radius:12px;
 padding:14px;
 box-shadow:0 6px 18px rgba(12,18,30,0.08);
 backdrop-filter:blur(6px);
 animation:slideUp .6s ease;
 border-left:6px solid #0b72ff;
 transition:.22s;
 position:relative;
 overflow:hidden;
 }
 .menu-card::after{
 content:"";
 position:absolute;
 right:-40px;top:-40px;width:120px;height:120px;
 background:radial-gradient(circle at 30% 30%, rgba(11,114,255,0.12), transparent 30%);
 transform:rotate(25deg);
 }
 .menu-card.nsfw{ border-left-color:#ff2f8e; }
 .menu-card h3{
 margin:0 0 8px;
 font-size:17px;
 font-weight:800;
 color:#0b72ff;
 }
 .menu-card p{
 margin:4px 0;font-size:14px;color:#222;
 }
 .menu-card:hover{
 transform:translateY(-6px) scale(1.02);
 box-shadow:0 18px 36px rgba(11,122,255,0.12);
 }
 @keyframes fadeIn{from{opacity:0; transform:translateY(15px);}to{opacity:1; transform:translateY(0);}}
 @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
 @keyframes pop{from{transform:scale(.96)}to{transform:scale(1)}}
 @keyframes slideUp{0%{opacity:0; transform:translateY(20px);}100%{opacity:1; transform:translateY(0);}}
 /* loader / processing */
 .proc{display:inline-flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;background:linear-gradient(90deg,#fff,#fbfbfb);box-shadow:inset 0 1px 0 rgba(255,255,255,0.6);}
 .dot{width:8px;height:8px;border-radius:50%;background:var(--green);opacity:.9;box-shadow:0 4px 12px rgba(12,18,30,0.08);animation:dot .9s infinite;}
 .dot:nth-child(2){animation-delay:.12s} .dot:nth-child(3){animation-delay:.24s}
 @keyframes dot{0%{transform:translateY(0)}50%{transform:translateY(-6px)}100%{transform:translateY(0)}}
 /* responsive */
 @media (max-width:900px){ .menu-grid{grid-template-columns:1fr} .chat-container{max-width:420px} }
</style>
</head>
<body>
<div class="wrap">
 <div class="chat-container" id="chatRoot">
 <div class="header" id="header">
 <div class="avatar-wrap"><img id="avatarImg" src="https://spacny.wuaze.com//uploads/images__21_.jpeg" alt="Aqua"></div>
 <div style="flex:1">
 <div class="title">Aqua Bot</div>
 <div class="sub">Juego de Cartas · Escribe <b>.menu</b></div>
 </div>
 <div class="sparkle">✨</div>
 </div>
 <div id="messages" role="log" aria-live="polite"></div>
 <div class="input-area">
 <input id="input" placeholder="Escribe un comando..." autocomplete="off" />
 <button id="sendBtn">Enviar</button>
 </div>
 </div>
</div>

<script>
/* --------------------
 AUDIO (WebAudio)
 -------------------- */
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function ensureAudio(){ if(!audioCtx) audioCtx = new AudioCtx(); }
function playBeep(type='sine', freq=720, dur=0.06, gain=0.05){
 try{
 ensureAudio();
 const o = audioCtx.createOscillator();
 const g = audioCtx.createGain();
 o.type = type; o.frequency.value = freq;
 g.gain.setValueAtTime(gain, audioCtx.currentTime);
 o.connect(g); g.connect(audioCtx.destination);
 o.start();
 g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
 o.stop(audioCtx.currentTime + dur + 0.02);
 }catch(e){}
}
function playSequence(seq){
 try{
 ensureAudio();
 let t = audioCtx.currentTime;
 seq.forEach(s=>{
 const o = audioCtx.createOscillator();
 const g = audioCtx.createGain();
 o.type = s.type||'sine';
 o.frequency.value = s.freq;
 g.gain.setValueAtTime(s.gain||0.05, t + (s.delay||0));
 o.connect(g); g.connect(audioCtx.destination);
 o.start(t + (s.delay||0));
 o.stop(t + (s.delay||0) + (s.dur||0.08));
 });
 }catch(e){}
}

/* --------------------
 HELPERS
 -------------------- */
const messages = document.getElementById('messages');
function appendBubble(html, className='bot'){
 const d=document.createElement('div');
 d.className='bubble '+className;
 d.innerHTML=html;
 messages.appendChild(d);
 setTimeout(()=> messages.scrollTo({top: messages.scrollHeight, behavior:'smooth'}), 60);
 return d;
}
function appendLoading(text="Cargando..."){ return appendBubble(`<div class="proc"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div style="margin-left:6px">${text}</div></div>`,'bot'); }
function escapeHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* safe fetch that returns parsed JSON when possible */
async function safeFetch(url, opts){
 const r = await fetch(url, opts);
 const text = await r.text();
 try{ return JSON.parse(text); }catch{ return {raw:text}; }
}

/* --------------------
 COMANDO .clear (NUEVO)
 -------------------- */
function cmd_clear(){
    if(confirm("¿Estás seguro de que quieres borrar TODO el chat de Aqua Bot?")){
        messages.innerHTML = '';
        appendBubble('🧹 <b>Chat borrado completamente.</b><br>👋 ¡Hola de nuevo! Usa <b>.menu</b> para ver los comandos.','bot');
        playBeep('sine', 440, 0.08, 0.06);
    }
}

/* --------------------
 GREETING
 -------------------- */
appendBubble('👋 <b>Hola — soy Aqua</b><br>Usa <b>.menu</b> para ver comandos.');

/* --------------------
 MENU (Aqua)
 -------------------- */
function cmd_menu(){
 const menuHtml = `
 <div class="aqua-menu">
 <div class="menu-header">
 <img class="menu-img" src="https://spacny.wuaze.com//uploads/images__19__2.jpeg" alt="Aqua Grande">
 <div class="menu-title">✨ MENÚ — AQUA BOT ✨</div>
 <div class="menu-sub">La diosa del agua te bendice con comandos mágicos</div>
 </div>
 <div class="menu-grid">
 <div class="menu-card">
 <h3>📘 Generales</h3>
 <p><b>.menu</b> — Mostrar menú</p>
 <p><b>.img waifu</b> — Waifu aleatoria</p>
 <p><b>.clear</b> — Borrar todo el chat</p>
 </div>
 <div class="menu-card nsfw">
 <h3>🔞 NSFW</h3>
 <p><b>.img random</b> — Imagen NSFW</p>
 <p><b>.play random</b> — Video NSFW</p>
 <p><b>.girl</b> — Chica aleatoria</p>
 <p><b>.waifu</b> — Waifu premium</p>
 </div>
 <div class="menu-card">
 <h3>🎵 Multimedia</h3>
 <p><b>.t texto</b> — TikTok por nombre</p>
 <p><b>.tiktok link</b> — TikTok por enlace</p>
 <p><b>.yt link</b> — Descargar YouTube</p>
 </div>
 <div class="menu-card">
 <h3>🤖 Inteligencia Artificial</h3>
 <p><b>.G texto</b> — Gemini Pro</p>
 <p><b>.ia texto</b> — ChatGPT</p>
 </div>
 <div class="menu-card">
 <h3>🌍 Otros</h3>
 <p><b>.traslate texto | idioma</b> — Traducir</p>
 </div>
 </div>
 </div>
 `;
 const node = appendBubble(menuHtml,'bot');
 playSequence([{freq:420,dur:0.06,delay:0},{freq:560,dur:0.06,delay:0.06}]);
}

/* --------------------
 API COMMANDS
 -------------------- */
function showImage(url){
 const el = appendBubble(`<img src="${url}" class="msg-img">`,'bot');
 playSequence([{freq:780,dur:0.08,delay:0},{freq:920,dur:0.06,delay:0.06}]);
}

async function cmd_img_waifu(){
 const loading = appendLoading("🔄 Waifu pública...");
 try{
 const d = await safeFetch("https://api.waifu.pics/sfw/waifu");
 loading.remove();
 if(d.url) showImage(d.url); else appendBubble("❌ Error.",'bot');
 }catch(e){ loading.remove(); }
}

/* LOGICA DEL INPUT */
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');

async function handleMsg(){
 const val = input.value.trim();
 if(!val) return;
 input.value = '';
 appendBubble(escapeHtml(val), 'user');

 const cmd = val.toLowerCase();
 if(cmd === '.menu') cmd_menu();
 else if(cmd === '.clear') cmd_clear();
 else if(cmd === '.img waifu') cmd_img_waifu();
 else {
    appendBubble("No reconozco ese comando. Prueba con <b>.menu</b>",'bot');
 }
}

sendBtn.addEventListener('click', handleMsg);
input.addEventListener('keydown', e => { if(e.key==='Enter') handleMsg(); });

</script>
</body>
</html>
